rder-radius:16px;margin:28px 0;color:#ffd0ad;line-height:1.8;font-weight:700}.side-card{position:sticky;top:92px;height:max-content}.side-card h3{margin:0 0 14px;font-size:18px}.info-list{display:grid;gap:10px;color:var(--muted);font-size:14px}.info-list div{border:1px solid var(--line);border-radius:15px;padding:12px;background:rgba(255,255,255,.04)}.info-list b{display:block;color:var(--text);margin-bottom:4px}.toc{display:grid;gap:9px;margin-top:16px}.toc a{color:var(--muted);font-size:13px;font-weight:800}.toc a:hover{color:var(--peach)}.related{margin-top:36px}.related h2{font-size:clamp(28px,4vw,46px);letter-spacing:-.05em;margin:0 0 18px}.related-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.related-card{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.055);overflow:hidden;transition:.22s ease}.related-card:hover{transform:translateY(-4px);border-color:rgba(255,192,144,.28)}.related-card img{width:100%;aspect-ratio:16/10;object-fit:cover;background:#0b1514}.related-card div{padding:16px}.related-card h3{font-size:16px;line-height:1.35;margin:0 0 8px}.related-card p{color:var(--muted);font-size:13px;line-height:1.6;margin:0}.footer{padding:26px;text-align:center;color:var(--muted);border-top:1px solid var(--line);background:rgba(255,255,255,.03)}

<body data-page="artikel-detail">
  <header class="header iim-unified-header">
    <a class="logo-wrap" href="index.html"><img class="logo" src="logo.png" alt="IMAN IN MOTION"><span>IMAN IN <b>MOTION</b></span></a>
    <button id="menuToggle" class="menu-toggle" aria-label="Buka menu" aria-expanded="false">☰</button>
    <nav class="nav" id="mainNav" aria-label="Navigasi utama">
      <a href="index.html">Home</a>

  <main class="wrap" id="app"></main>
  <footer class="footer">IMAN IN MOTION • Artikel film</footer>
  <script src="js/articles-data.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const ARTICLES = Array.isArray(window.IMAN_ARTICLES) ? window.IMAN_ARTICLES : [];
    const params = new URLSearchParams(location.search);
    const article = ARTICLES.find(a => String(a.id) === String(params.get('id'))) || ARTICLES[0];
    const nav = $('#mainNav');
    $('#menuToggle')?.addEventListener('click', () => { nav.classList.toggle('open'); $('#menuToggle').setAttribute('aria-expanded', nav.classList.contains('open') ? 'true' : 'false'); });
    document.addEventListener('click', e => { if(!e.target.closest('.header')) nav.classList.remove('open'); });
    function words(v, fallback=''){ return String(v ?? fallback).trim() || fallback; }
    function splitGenres(v){ return String(v || '').replace(/\|/g, ',').split(',').map(x => x.trim()).filter(Boolean); }
    function sentenceList(items, max=3){ items=(items||[]).filter(Boolean).slice(0,max); if(!items.length) return 'cerita emosional'; if(items.length===1) return items[0]; if(items.length===2) return items[0]+' dan '+items[1]; return items.slice(0,-1).join(', ')+', dan '+items.at(-1); }
    function moodText(mood){
      const map = {sedih:'menyentuh, pelan, dan dekat dengan rasa kehilangan',gelisah:'tegang, penuh tekanan, dan cocok untuk penonton yang suka konflik batin',hidayah:'reflektif, spiritual, dan membuka ruang untuk berpikir ulang',bahagia:'hangat, ringan, dan enak ditonton saat ingin suasana lebih lega',marah:'intens, tajam, dan dipenuhi energi konflik yang kuat',rindu:'melankolis, personal, dan dekat dengan kenangan',tenang:'kalem, lembut, dan memberi ruang untuk menikmati cerita pelan-pelan',semangat:'mengangkat energi, perjuangan, dan dorongan untuk tidak gampang menyerah',inspiratif:'membangkitkan harapan dan memberi dorongan positif'};
      return map[String(mood||'').toLowerCase()] || 'emosional dan punya rasa yang cukup kuat untuk dibaca dari banyak sisi';
    }
    function eraText(year){ year=Number(year)||0; if(year>=2023) return 'rilis baru yang masih terasa segar'; if(year>=2015) return 'film modern yang masih relevan'; if(year>=2000) return 'film 2000-an yang masih punya daya tarik'; return 'film klasik yang tetap menarik dibaca ulang'; }
    function cleanTag(t){ return String(t||'').replace(/_/g,' ').trim(); }
    function buildLongArticle(a){
      const title = words(a.movieTitle || a.title, 'Film ini');
      const genres = splitGenres(a.genres);
      const genreText = sentenceList(genres, 3);
      const firstGenre = genres[0] || 'drama';
      const tags = (a.tags || []).map(cleanTag).filter(Boolean).filter(t => ![String(a.mood).toLowerCase(), ...genres.map(g=>g.toLowerCase())].includes(t.toLowerCase())).slice(0,6);
      const tagText = sentenceList(tags, 4) || 'perjalanan tokoh dan pilihan sulit';
      const mood = words(a.mood || 'emosional');
      const year = words(a.year || '-');
      const country = words(a.country || 'berbagai latar produksi');
      const language = words(a.language || 'bahasa yang khas');
      const rating = a.rating || '-';
      const overview = words(a.overview || a.excerpt, 'Film ini membawa penonton masuk ke konflik yang bertumbuh dari pilihan tokohnya.');
      const moodDesc = moodText(mood);
      const era = eraText(year);
      const introVariant = Number(a.id || 1) % 4;
      const hook = [
        `Ada film yang selesai ditonton lalu hilang begitu saja. Tapi ada juga film yang meninggalkan rasa, membuat kita ingin mengingat ulang keputusan tokohnya, lalu membicarakannya lagi setelah layar gelap. <b>${esc(title)}</b> berada di wilayah kedua: film yang menarik bukan hanya karena premisnya, tetapi karena suasana yang dibangun pelan-pelan.`,
        `<b>${esc(title)}</b> bisa dibaca sebagai tontonan yang tidak hanya mengejar kejadian besar. Ia memberi ruang untuk memperhatikan ekspresi, pilihan, tekanan, dan perubahan kecil yang dialami tokoh. Justru dari detail-detail seperti itu, film ini punya daya tarik yang terasa manusiawi.`,
        `Kalau kamu sedang mencari film yang punya rasa, <b>${esc(title)}</b> layak dilirik. Film ini bergerak di area ${esc(genreText)}, tetapi kekuatannya tidak berhenti pada label genre. Ada nuansa, konflik, dan pertanyaan kecil yang bisa menemani penonton setelah film selesai.`,
        `Beberapa film cocok ditonton saat kita ingin hiburan cepat. Sebagian lainnya lebih cocok dinikmati pelan-pelan. <b>${esc(title)}</b> termasuk tontonan yang enak dibaca dari beberapa sisi: cerita, emosi, konteks, dan suasana yang dibawa sepanjang durasi.`
      ][introVariant];
      return `
        <p>${hook}</p>
        <p>Secara garis besar, film ini memiliki premis: ${esc(overview)} Premis seperti ini memberi pintu masuk yang jelas. Penonton tahu konflik utamanya, tetapi masih diberi ruang untuk menilai sendiri bagaimana tokoh menghadapi keadaan, mengambil keputusan, dan berubah karena tekanan yang muncul.</p>
        <div class="quote">${esc(a.fact || `Nuansa ${mood} membuat film ini menarik untuk dipilih berdasarkan suasana hati, bukan hanya berdasarkan genre.`)}</div>

        <h2 id="kenapa">Kenapa film ini menarik untuk dibahas?</h2>
        <p>Yang membuat ${esc(title)} menarik adalah caranya membangun pengalaman menonton. Film bernuansa ${esc(mood)} biasanya tidak hanya menampilkan konflik dari luar, tetapi juga mengajak penonton merasakan kondisi batin tokohnya. Kadang konflik terbesar bukan ledakan, kejar-kejaran, atau pertengkaran besar. Kadang konflik terbesar justru muncul ketika seseorang harus memilih diam, bertahan, pergi, memaafkan, atau menerima sesuatu yang tidak bisa diubah.</p>
        <p>Dalam ${esc(title)}, genre ${esc(genreText)} menjadi fondasi yang membantu cerita bergerak. Jika unsur ${esc(firstGenre)} terasa dominan, maka film ini punya ruang untuk membangun tekanan emosional yang lebih kuat. Genre memang bisa membantu kita menebak rasa awal sebuah film, tetapi pengalaman sebenarnya tetap muncul dari cara cerita mengatur ritme, menyusun adegan, dan mempertemukan tokoh dengan konsekuensi dari pilihannya.</p>

        <h2 id="kriteria">Alasan film ini masuk rekomendasi</h2>
        <p>Film ini bisa masuk watchlist karena beberapa alasan sederhana. Pertama, ia punya suasana yang jelas. Penonton yang sedang mencari tontonan bernuansa ${esc(mood)} tidak perlu menebak terlalu jauh. Kedua, ceritanya punya bahan untuk dibicarakan setelah selesai. Ketiga, detail seperti tahun rilis, bahasa, negara produksi, dan rating memberi konteks tambahan sebelum kamu memutuskan untuk menonton.</p>
        <ul>
          <li><b>Nuansa utama:</b> ${esc(moodDesc)}.</li>
          <li><b>Genre:</b> ${esc(genreText)}, cocok untuk penonton yang ingin cerita dengan warna emosi cukup kuat.</li>
          <li><b>Konteks rilis:</b> ${esc(title)} hadir sebagai ${esc(era)}, sehingga cara bertuturnya bisa dibandingkan dengan film lain di periode serupa.</li>
          <li><b>Nilai awal:</b> rating sekitar ${esc(rating)} bisa menjadi petunjuk cepat, meskipun rasa cocok tetap ditentukan oleh selera penonton.</li>
        </ul>

        <h2 id="cerita">Cerita, rasa, dan konflik yang bekerja pelan-pelan</h2>
        <p>Film yang baik tidak selalu harus menjelaskan semuanya secara berlebihan. Sering kali, yang paling membekas adalah momen ketika penonton diberi ruang untuk membaca sendiri apa yang terjadi. ${esc(title)} punya peluang seperti itu. Lewat konflik yang dibangun, penonton bisa melihat bagaimana tokoh bertahan di tengah situasi yang tidak selalu mudah. Ada tekanan, ada pilihan, dan ada konsekuensi yang membuat cerita terasa lebih hidup.</p>
        <p>Nuansa ${esc(mood)} juga membuat film ini cocok dibaca dari sisi emosional. Penonton bisa bertanya: apa yang sebenarnya dicari tokohnya? Apa yang membuat mereka bertahan? Apa yang membuat mereka berubah? Pertanyaan-pertanyaan seperti ini membuat film terasa lebih dekat, karena pada akhirnya banyak cerita sinema berangkat dari hal yang sangat manusiawi: takut kehilangan, ingin dipahami, ingin pulang, ingin bebas, ingin memperbaiki kesalahan, atau sekadar ingin tetap kuat.</p>

        <h2 id="konteks">Konteks bahasa, negara, dan cara bertutur</h2>
        <p>${esc(title)} berasal dari ${esc(country)} dengan bahasa ${esc(language)}. Detail seperti ini mungkin terlihat kecil, tetapi sering memengaruhi cara film berbicara kepada penonton. Setiap latar produksi membawa kebiasaan bertutur yang berbeda. Ada film yang lebih tenang, ada yang lebih ekspresif, ada yang lebih gelap, dan ada pula yang memilih menyampaikan emosi lewat simbol atau suasana.</p>
        <p>Karena itu, menonton film dari berbagai negara dan bahasa bisa memperluas cara kita membaca cerita. Kita tidak hanya melihat alur, tetapi juga cara budaya tertentu memahami keluarga, perjuangan, kehilangan, cinta, iman, keberanian, atau rasa bersalah. Dari titik inilah sebuah film bisa terasa segar, bahkan ketika tema besarnya sudah pernah kita temui sebelumnya.</p>

        <h2 id="insight">Insight yang bisa dibawa pulang</h2>
        <p>Salah satu hal yang bisa diambil dari ${esc(title)} adalah bahwa film sering bekerja seperti cermin. Ia tidak selalu memberi jawaban, tetapi bisa memancing penonton untuk melihat ulang perasaan sendiri. Jika kamu sedang berada di fase yang dekat dengan nuansa ${esc(mood)}, film ini mungkin terasa lebih personal. Bukan karena ceritanya sama persis dengan hidupmu, tetapi karena emosinya menyentuh wilayah yang familiar.</p>
        <p>Tema yang muncul di sekitar film ini, seperti ${esc(tagText)}, membuat pembacaannya lebih luas. Kamu bisa menikmati film ini sebagai hiburan, tetapi juga bisa menjadikannya bahan refleksi ringan. Setelah menonton, coba ingat satu adegan yang paling menempel. Biasanya, adegan yang paling membekas bukan hanya yang paling indah secara visual, tetapi yang paling jujur secara emosi.</p>

        <h2 id="cocok">Cocok ditonton oleh siapa?</h2>
        <p>${esc(title)} cocok untuk penonton yang ingin tontonan dengan rasa ${esc(moodDesc)}. Kalau kamu suka cerita yang tidak hanya bergerak dari satu kejadian ke kejadian lain, tetapi juga memberi ruang untuk memahami tokoh, film ini bisa jadi pilihan. Ia juga cocok untuk kamu yang suka membaca film dari sisi suasana hati: bukan sekadar “film apa yang bagus?”, tetapi “film apa yang pas dengan kondisiku sekarang?”</p>
        <p>Namun, seperti semua rekomendasi, film ini tetap bergantung pada mood dan selera. Ada hari ketika kita butuh film ringan. Ada juga hari ketika kita ingin cerita yang lebih dalam. ${esc(title)} paling pas ditonton saat kamu siap mengikuti ritme ceritanya, memberi perhatian pada detail, dan membiarkan suasananya bekerja tanpa terburu-buru mencari kesimpulan.</p>

        <h2 id="penutup">Penutup</h2>
        <p>Pada akhirnya, ${esc(title)} bukan hanya soal judul, genre, atau rating. Film ini menarik karena punya bahan untuk dinikmati dan dibicarakan. Ia membawa penonton masuk ke dunia cerita, memperkenalkan konflik, lalu meninggalkan rasa tertentu setelah selesai. Itulah alasan film seperti ini layak mendapat tempat di daftar tontonan.</p>
        <p>Kalau kamu sedang mencari film bernuansa ${esc(mood)}, dengan sentuhan ${esc(genreText)}, dan cerita yang bisa dibaca dari beberapa sisi, ${esc(title)} bisa kamu pertimbangkan. Tonton pelan-pelan, perhatikan detailnya, lalu biarkan filmnya menjawab sendiri apakah ia cocok dengan suasana hatimu hari ini.</p>
      `;
    }
    function relatedFor(a){
      const genres = splitGenres(a.genres).map(x => x.toLowerCase());
      return ARTICLES.filter(x => x.id !== a.id).map(x => {
        const score = (x.mood === a.mood ? 5 : 0) + splitGenres(x.genres).filter(g => genres.includes(g.toLowerCase())).length * 2 + (Math.abs((x.year||0)-(a.year||0)) <= 2 ? 1 : 0);
        return {x,score};
      }).sort((a,b) => b.score - a.score || (b.x.rating||0)-(a.x.rating||0)).slice(0,3).map(r => r.x);
    }
    function render(){
      if(!article){ $('#app').innerHTML = '<a class="back" href="artikel.html">← Kembali ke Artikel</a><div class="article-card">Artikel tidak ditemukan.</div>'; return; }
      document.title = `${article.title} — IMAN IN MOTION`;
      const related = relatedFor(article);
      $('#app').innerHTML = `
        <a class="back" href="artikel.html">← Kembali ke daftar artikel</a>
        <section class="article-hero">
          <img class="poster" src="${esc(article.poster || 'logo.png')}" alt="${esc(article.movieTitle)}" onerror="this.src='logo.png'">
          <div>
            <span class="badge">Artikel Film</span>
            <h1>${esc(article.title)}</h1>
            <p class="lead">${esc(article.excerpt)}</p>
            <div class="meta">
              <span class="pill">${esc(article.date || 'Update terbaru')}</span>
              <span class="pill">${esc(article.mood || 'mood')}</span>
              <span class="pill">★ ${esc(article.rating || '-')}</span>
            </div>
          </div>
        </section>
        <section class="content-grid">
          <article class="article-card article-content">${buildLongArticle(article)}</article>
          <aside class="side-card">
            <h3>Ringkasan Film</h3>
            <div class="info-list">
              <div><b>Judul</b>${esc(article.movieTitle || '-')}</div>
              <div><b>Tahun</b>${esc(article.year || '-')}</div>
              <div><b>Genre</b>${esc(article.genres || '-')}</div>
              <div><b>Mood</b>${esc(article.mood || '-')}</div>
              <div><b>Bahasa</b>${esc(article.language || '-')}</div>
              <div><b>Negara</b>${esc(article.country || '-')}</div>
            </div>
            <div class="toc">
              <a href="#kenapa">Kenapa menarik?</a>
              <a href="#kriteria">Alasan rekomendasi</a>
              <a href="#cerita">Cerita dan konflik</a>
              <a href="#insight">Insight</a>
              <a href="#cocok">Cocok untuk siapa?</a>
            </div>
          </aside>
        </section>
        <section class="related">
          <h2>Baca juga:</h2>
          <div class="related-grid">
            ${related.map(r => `<a class="related-card" href="artikel-detail.html?id=${encodeURIComponent(r.id)}"><img src="${esc(r.poster || 'logo.png')}" alt="${esc(r.movieTitle)}" onerror="this.src='logo.png'"><div><h3>${esc(r.title)}</h3><p>${esc(r.excerpt)}</p></div></a>`).join('')}
          </div>
        </section>`;
    }
    render();
  </script>
  <script src="js/iim-mobile-nav.js"></script>
</body>

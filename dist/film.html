<section class="hero"><h1>Film Library</h1><p>Explore rekomendasi film dari dataset kamu. Urutkan berdasarkan rating, terbaru, judul, lalu filter berdasarkan genre, mood, dan caster/cast.</p></section>
<section class="toolbar">
  <div class="field"><label>Search title / caster</label><input id="q" type="search" placeholder="Cari film, aktor, keyword..."></div>
  <div class="field"><label>Sort by</label><select id="sort"><option value="rating-desc">Rating tertinggi</option><option value="year-desc">Terbaru</option><option value="year-asc">Terlama</option><option value="title-asc">Judul A-Z</option><option value="rating-asc">Rating terendah</option></select></div>
  <div class="field"><label>Genre</label><select id="genre"><option value="">Semua genre</option></select></div>
  <div class="field"><label>Mood</label><select id="mood"><option value="">Semua mood</option></select></div>
  <div class="field"><label>Caster / Cast</label><select id="cast"><option value="">Semua caster</option></select></div>
</section>
<div class="stats" id="stats"></div><main class="grid" id="grid"></main>
<div class="modal" id="modal"><div class="modal-card"><button class="close" id="close">×</button><div id="detail"></div></div></div>
<script>
const RAW_MOVIES =
  Array.isArray(window.IMAN_MOVIES) && window.IMAN_MOVIES.length
    ? window.IMAN_MOVIES
    : Array.isArray(window.MOVIES_DATA)
      ? window.MOVIES_DATA
      : [];

function normalizeCast(value){
  if(Array.isArray(value)) return value.filter(Boolean).map(String);
  return String(value || "")
    .split(/[|,;]/)
    .map(x => x.trim())
    .filter(Boolean);
}

const MOVIES = RAW_MOVIES.map(m => ({
  ...m,
  title_asli: m.title_asli || m.title || m.title_en || "Film",
  title_en: m.title_en || "",
  genres: m.genres || m.genre || "",
  poster_url: m.poster_url || m.poster || "",
  backdrop_url: m.backdrop_url || "",
  overview: m.overview || m.sinopsis || m.synopsis || "",
  mood: String(m.mood || "tenang").toLowerCase(),
  cast: normalizeCast(m.cast || m.caster || m.actors || m.actor),
  rating: Number(m.rating || 0),
  year: Number(String(m.year || "").match(/\d{4}/)?.[0] || 0),
  keywords: m.keywords || "",
  country: m.country || "",
  original_language: m.original_language || m.language || ""
}));
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function unique(values){return [...new Set(values.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b)))}
function fillFilters(){const genres=unique(MOVIES.flatMap(m=>String(m.genres||'').split('|').map(x=>x.trim()))); $('#genre').innerHTML+=""+genres.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join(''); const moods=unique(MOVIES.map(m=>m.mood)); $('#mood').innerHTML+=moods.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join(''); const casts=unique(MOVIES.flatMap(m=>m.cast)).slice(0,300); $('#cast').innerHTML+=casts.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('')}
function getFiltered(){let list=[...MOVIES];const q=$('#q').value.toLowerCase().trim(), genre=$('#genre').value, mood=$('#mood').value, cast=$('#cast').value, sort=$('#sort').value;if(q) list=list.filter(m=>[m.title_asli,m.title_en,m.genres,m.mood,m.overview,m.keywords,m.cast.join(' ')].join(' ').toLowerCase().includes(q));if(genre) list=list.filter(m=>String(m.genres||'').toLowerCase().includes(genre.toLowerCase()));if(mood) list=list.filter(m=>m.mood===mood);if(cast) list=list.filter(m=>m.cast.includes(cast));list.sort((a,b)=>sort==='rating-desc'?b.rating-a.rating:sort==='rating-asc'?a.rating-b.rating:sort==='year-desc'?b.year-a.year:sort==='year-asc'?a.year-b.year:String(a.title_asli).localeCompare(String(b.title_asli)));return list}
function render(){const list=getFiltered();$('#stats').textContent=`${list.length} film ditemukan`;$('#grid').innerHTML=list.slice(0,120).map((m,i)=>`<article class="card" data-id="${MOVIES.indexOf(m)}"><div class="poster"><img src="${esc(m.poster_url||'logo.png')}" onerror="this.src='logo.png'" loading="lazy" alt="${esc(m.title_asli)}"></div><div class="info"><h3>${esc(m.title_asli)}</h3><p>${esc(m.year||'-')} • ${esc(m.genres||'-')}</p><div class="chips"><span class="chip">★ ${m.rating?m.rating.toFixed(1):'-'}</span><span class="chip">${esc(m.mood||'mood')}</span></div></div></article>`).join('')||'<div class="empty">Film tidak ditemukan.</div>'}
function openDetail(m){$('#detail').innerHTML=`<div class="detail"><img src="${esc(m.poster_url||'logo.png')}" onerror="this.src='logo.png'" alt="${esc(m.title_asli)}"><div><h2>${esc(m.title_asli)} (${esc(m.year||'-')})</h2><p style="color:var(--muted)">${esc(m.genres||'-')} • Mood: ${esc(m.mood||'-')} • Rating: ★ ${m.rating?m.rating.toFixed(1):'-'}</p><p>${esc(m.overview||'Belum ada sinopsis.')}</p><h3>Caster / Cast</h3><div class="cast">${(m.cast||[]).map(c=>`<span>${esc(c)}</span>`).join('')||'<span>Cast belum tersedia</span>'}</div><p style="color:var(--muted)">Country: ${esc(m.country||'-')} • Language: ${esc(m.original_language||'-')}</p></div></div>`;$('#modal').classList.add('open')}
fillFilters();render();['q','sort','genre','mood','cast'].forEach(id=>$('#'+id).addEventListener('input',render));$('#grid').addEventListener('click',e=>{const card=e.target.closest('.card'); if(card) openDetail(MOVIES[Number(card.dataset.id)])});$('#close').onclick=()=>$('#modal').classList.remove('open');$('#modal').addEventListener('click',e=>{if(e.target.id==='modal') $('#modal').classList.remove('open')});
</script>
